name: KBO 관중 데이터 자동 업데이트

on:
  schedule:
    # 매일 오전 8시 30분 KST (= UTC 23:30 전날) 자동 실행 → 증분(신규 경기만) 수집
    - cron: '30 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼. 평소엔 그냥 실행(증분).
    # 정합성 점검/복구가 필요할 때만 full_refetch 를 true 로 켜서 전체 재수집.
    inputs:
      full_refetch:
        description: '전체 시즌 재수집(정합성 점검·복구용). 평소엔 false 유지'
        type: boolean
        default: false

# peaceiris 배포는 contents: write 만 필요 (gh-pages 브랜치에 push)
permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      # 1. 저장소 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      # 2. Python 설정
      - name: Python 3.11 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 의존성 설치
      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # 4. KBO 관중 데이터 수집
      #    - 평소(스케줄/일반 수동): fetch_daily.py = 현재 달을 보고 '없는 경기만' 추가(증분)
      #    - 수동 + full_refetch=true: fetch_kbo.py = 전체 시즌 재수집(기존 보존, 누락 보충)
      #    두 스크립트 모두 game_id 기준 안전 병합이라 중복이 쌓이지 않음
      - name: KBO 관중 데이터 수집
        run: |
          if [ "${{ github.event.inputs.full_refetch }}" = "true" ]; then
            echo "전체 재수집 모드 (fetch_kbo.py)"
            python fetch_kbo.py
          else
            echo "증분 수집 모드 (fetch_daily.py)"
            python fetch_daily.py
          fi
        continue-on-error: true   # 수집 실패해도 배포는 계속(다음 실행이 그 달을 다시 보며 자동 보충)

      # 5. 날씨 데이터 보강 (신규 경기에만 API 호출, 기존 건은 자동 스킵)
      - name: 경기 날씨 데이터 보강
        run: python fetch_weather.py
        continue-on-error: true

      # 6. 배포 날짜 계산 (KST)
      - name: 배포 날짜 계산(KST)
        run: echo "DEPLOY_DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" >> "$GITHUB_ENV"

      # 7. 변경사항 커밋 (kbo_games.json 만 커밋; 백업 .bak 등은 제외)
      - name: 데이터 파일 커밋
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add kbo_games.json || true
          git diff --staged --quiet || git commit -m "KBO 데이터 자동 업데이트 ${DEPLOY_DATE}"
          git push || true

      # 8. GitHub Pages 배포 (index.html + kbo_games.json 등 정적 파일)
      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.py,*.txt,*.md,*.bak,*.json.bak'
          commit_message: "대시보드 배포 ${{ env.DEPLOY_DATE }}"

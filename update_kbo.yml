name: KBO 관중 데이터 자동 업데이트

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: KBO 데이터 수집
        run: python fetch_kbo.py
        continue-on-error: true

      - name: 데이터 파일 커밋
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add kbo_games.json || true
          git diff --staged --quiet || git commit -m "KBO 데이터 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push || true

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.py,*.txt,*.md'
